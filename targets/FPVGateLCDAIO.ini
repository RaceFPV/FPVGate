[env:FPVGateLCDAIO]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
board_build.partitions = custom_8mb.csv
board_upload.flash_size = 16MB
upload_speed = 921600
monitor_speed = 921600
board_build.f_cpu = 240000000L
; PSRAM configuration (Waveshare ESP32-S3-LCD-2 has 2MB PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
lib_compat_mode = strict
; AUDIO lib uses ESP8266Audio (legacy I2S) which conflicts with IDF 5.x new I2S driver.
; TODO: Port audio code to new I2S API to re-enable.
lib_ignore = AUDIO
lib_deps = 
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    bblanchon/ArduinoJson @7.2.0
    ayushsharma82/ElegantOTA @^3.1.6
    fastled/FastLED @^3.7.0
    moononournation/GFX Library for Arduino @^1.4.7
    lvgl/lvgl @^8.3.11
    bodmer/TFT_eSPI@^2.5.43
build_flags = 
    -DFPVGATE_LCD_AIO=1
    -DENABLE_LCD_UI=1
    -DCONFIG_ASYNC_TCP_EVENT_QUEUE_SIZE=256
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; PSRAM
    -DBOARD_HAS_PSRAM
    -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1
    -DCONFIG_SPIRAM=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DCONFIG_SPIRAM_SPEED_80M=1
    -DCONFIG_SPIRAM_USE_MALLOC=1
    ; Disable core dump
    -DCONFIG_ESP_COREDUMP_ENABLE=0
    -DCONFIG_ESP_COREDUMP_ENABLE_TO_NONE=1
    ; LVGL config
    -I$PROJECT_DIR/lib/LCD_UI
    -DLV_CONF_PATH="lv_conf.h"
    -DLV_LVGL_H_INCLUDE_SIMPLE=1
    ; Board identifier
    -DBOARD_ESP32_S3_TOUCH=1
    ; Prevent Arduino framework from using GPIO48 for built-in RGB LED
    ; (conflicts with I2C SDA for touch controller on this board)
    -DRGB_BUILTIN=-1
    ; ADC DMA for RSSI
    -DUSE_ADC_DMA=1

; Minimal touch-only test for Waveshare ESP32-S3-Touch-LCD-2.8 (CST328 on Wire1).
; Run from this folder: pio run -e touch_minimal
; If 259/NACK appears here too, the issue is Wire1 + driver_ng + CST328 on this board.
; If touch is stable here, the issue is interaction with LVGL/display/other tasks in FPVGate.

[env:touch_minimal]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
board_build.f_cpu = 240000000L

[env:WaveshareESP32S3LCD2]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
board_build.partitions = custom_8mb.csv
board_upload.flash_size = 16MB
upload_speed = 921600
monitor_speed = 921600
board_build.f_cpu = 240000000L
; PSRAM configuration (Waveshare ESP32-S3-LCD-2 has 2MB PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
lib_compat_mode = strict
; AUDIO lib pulls in ESP8266Audio which uses the legacy I2S driver — fatal conflict on IDF 5.x.
; This board has no I2S audio (HAS_I2S_AUDIO is not defined), so suppress the whole lib.
lib_ignore = AUDIO
lib_deps = 
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    bblanchon/ArduinoJson @7.2.0
    ayushsharma82/ElegantOTA @^3.1.6
    fastled/FastLED @^3.7.0
    moononournation/GFX Library for Arduino @^1.4.7
    lvgl/lvgl @^8.3.11
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/Links2004/arduinoWebSockets.git
build_flags = 
    -DWAVESHARE_ESP32S3_LCD2=1
    -DENABLE_LCD_UI=1
    -DENABLE_POWER_SWITCH=1
    -DCONFIG_ASYNC_TCP_EVENT_QUEUE_SIZE=256
    -UCONFIG_ASYNC_TCP_USE_WDT
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; PSRAM
    -DBOARD_HAS_PSRAM
    -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1
    -DCONFIG_SPIRAM=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DCONFIG_SPIRAM_SPEED_80M=1
    -DCONFIG_SPIRAM_USE_MALLOC=1
    ; Disable core dump (prevents CRC errors on boot)
    -DCONFIG_ESP_COREDUMP_ENABLE=0
    -DCONFIG_ESP_COREDUMP_ENABLE_TO_NONE=1
    ; LVGL config for StarForge-style LCD UI
    -I$PROJECT_DIR/lib/LCD_UI
    -I$PROJECT_DIR/lib/QMI8658
    -DLV_CONF_PATH="lv_conf.h"
    -DLV_LVGL_H_INCLUDE_SIMPLE=1
    ; Board identifier for StarForge compatibility
    -DBOARD_ESP32_S3_TOUCH=1
    ; Use ESP-IDF ADC continuous (DMA) mode for RSSI reads.
    -DUSE_ADC_DMA=1
    ; Silence task watchdog reset spam in this board profile.
    -DCONFIG_ESP_TASK_WDT_EN=0
    -DCONFIG_ESP_TASK_WDT_INIT=0
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0=0
    -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1=0

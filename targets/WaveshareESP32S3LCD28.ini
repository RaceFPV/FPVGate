[env:WaveshareESP32S3LCD28]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
; Ensure mklittlefs tool is installed for uploadfs (builds LittleFS from data/)
platform_packages =
    tool-mklittlefs@https://github.com/pioarduino/registry/releases/download/0.0.1/mklittlefs-3.2.0-new.zip
; Point MKFSTOOL at the installed binary (fixes "mklittlefs: not found" when not on PATH)
extra_scripts = post:scripts/set_mklittlefs_path.py
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
board_build.partitions = custom_8mb.csv
board_upload.flash_size = 16MB
upload_speed = 921600
monitor_speed = 921600
board_build.f_cpu = 240000000L
; PSRAM configuration (Waveshare ESP32-S3-Touch-LCD-2.8 has 8MB PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
lib_compat_mode = strict
; AUDIO lib pulls in ESP8266Audio which uses the legacy I2S driver — fatal conflict on IDF 5.x.
; This board has I2S for PCM5101 speaker; HAS_I2S_AUDIO is not defined for FPVGate, so suppress the whole lib.
lib_ignore = AUDIO
; TFT_eSPI removed: we use Arduino_GFX for display; having it linked can pull in I2C touch init and conflict with our touch on Wire/Wire1
lib_deps = 
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    bblanchon/ArduinoJson @7.2.0
    ayushsharma82/ElegantOTA @^3.1.6
    fastled/FastLED @^3.7.0
    moononournation/GFX Library for Arduino @^1.4.7
    lvgl/lvgl @^8.3.11
build_flags = 
    -DWAVESHARE_ESP32S3_LCD28=1
    ; Touch debug: uncomment to log I2C (reg, err), init steps, poll count, recover; leave commented for normal use
    ; -DCST328_DEBUG=1
    -DENABLE_LCD_UI=1
    -DCONFIG_ASYNC_TCP_EVENT_QUEUE_SIZE=256
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; PSRAM
    -DBOARD_HAS_PSRAM
    -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1
    -DCONFIG_SPIRAM=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DCONFIG_SPIRAM_SPEED_80M=1
    -DCONFIG_SPIRAM_USE_MALLOC=1
    ; Disable core dump (prevents CRC errors on boot)
    -DCONFIG_ESP_COREDUMP_ENABLE=0
    -DCONFIG_ESP_COREDUMP_ENABLE_TO_NONE=1
    ; Disable task WDT so libs that call esp_task_wdt_reset() don't log "task not found" (no subscribed task)
    -DCONFIG_ESP_TASK_WDT_ENABLE=0
    ; LVGL config for StarForge-style LCD UI
    -I$PROJECT_DIR/lib/LCD_UI
    -DLV_CONF_PATH="lv_conf.h"
    -DLV_LVGL_H_INCLUDE_SIMPLE=1
    ; Board identifier for StarForge compatibility
    -DBOARD_ESP32_S3_TOUCH=1
    ; RX5808 RSSI on GPIO15 is ADC2 only; ESP32-S3 ADC continuous DMA supports ADC1 only by default.
    ; Do not define USE_ADC_DMA for this board — readRssi() uses analogRead() fallback instead.

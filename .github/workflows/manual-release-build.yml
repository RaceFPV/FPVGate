name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.5.1)'
        required: true
        type: string

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - ESP32S3
          - ESP32S3SuperMini
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      
      - name: Install PlatformIO
        run: |
          pip install platformio
          pio upgrade
      
      - name: Build firmware (${{ matrix.environment }})
        run: pio run -e ${{ matrix.environment }}
      
      - name: Build filesystem (${{ matrix.environment }})
        run: pio run -e ${{ matrix.environment }} -t buildfs
        continue-on-error: true
      
      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts/${{ matrix.environment }}
          
          # Copy firmware binary
          if [ -f .pio/build/${{ matrix.environment }}/firmware.bin ]; then
            cp .pio/build/${{ matrix.environment }}/firmware.bin \
               release-artifacts/${{ matrix.environment }}/firmware.bin
          fi
          
          # Copy filesystem binary
          if [ -f .pio/build/${{ matrix.environment }}/littlefs.bin ]; then
            cp .pio/build/${{ matrix.environment }}/littlefs.bin \
               release-artifacts/${{ matrix.environment }}/littlefs.bin
          fi
          
          # Copy bootloader
          if [ -f ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32s3/bin/bootloader_dio_80m.bin ]; then
            cp ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32s3/bin/bootloader_dio_80m.bin \
               release-artifacts/${{ matrix.environment }}/bootloader.bin
          elif [ -f ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32c3/bin/bootloader_dio_40m.bin ]; then
            cp ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32c3/bin/bootloader_dio_40m.bin \
               release-artifacts/${{ matrix.environment }}/bootloader.bin
          elif [ -f ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32/bin/bootloader_dio_40m.bin ]; then
            cp ~/.platformio/packages/framework-arduinoespressif32/tools/sdk/esp32/bin/bootloader_dio_40m.bin \
               release-artifacts/${{ matrix.environment }}/bootloader.bin
          fi
          
          # Copy partition table
          if [ -f .pio/build/${{ matrix.environment }}/partitions.bin ]; then
            cp .pio/build/${{ matrix.environment }}/partitions.bin \
               release-artifacts/${{ matrix.environment }}/partitions.bin
          fi
          
          # Create flash command reference
          cat > release-artifacts/${{ matrix.environment }}/FLASH_INSTRUCTIONS.txt << 'EOF'
          Flash using esptool:
          
          esptool.py --chip auto --port COM3 write_flash -z \
            0x0 bootloader.bin \
            0x8000 partitions.bin \
            0x10000 firmware.bin \
            0x410000 littlefs.bin
          
          Or use PlatformIO:
          pio run -e ${{ matrix.environment }} -t upload
          pio run -e ${{ matrix.environment }} -t uploadfs
          EOF
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FPVGate-${{ inputs.version }}-${{ matrix.environment }}
          path: release-artifacts/${{ matrix.environment }}/*
          retention-days: 90
  
  create-release-bundle:
    needs: build-firmware
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-bundle
      
      - name: Create unified release package
        run: |
          cd release-bundle
          zip -r ../FPVGate-${{ inputs.version }}-AllBoards.zip .
      
      - name: Upload complete bundle
        uses: actions/upload-artifact@v4
        with:
          name: FPVGate-${{ inputs.version }}-Complete
          path: FPVGate-${{ inputs.version }}-AllBoards.zip
          retention-days: 90
